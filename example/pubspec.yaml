name: animemaster_example
description: "AnimeMaster Android application."
publish_to: 'none'
version: 2.3.5+2042

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  animemaster:
    path: ../
  media_kit: ^1.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../assets/icon.png"
  remove_alpha_ios: true
