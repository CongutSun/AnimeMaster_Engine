name: animemaster
description: "A professional commercial-grade Flutter FFI plugin engine for AnimeMaster."
version: 2.3.2
homepage:

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
    
  # 原有 Engine 核心依赖
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.3
  # ---------------------------------------------------------------------------
  # 整合自 AnimeMaster_Pro_mobile 的业务模块依赖
  # ---------------------------------------------------------------------------
  
  
  # 网络、通信与下载 (Networking & Downloading)
  dio: ^5.9.2
  dtorrent_parser: ^0.4.1
  dtorrent_task: ^0.4.1
  
  # 数据解析与状态管理 (Data Parsing & State Management)
  html: ^0.15.6
  dart_rss: 3.0.3
  provider: ^6.1.5+1
  
  # 本地存储与缓存 (Local Storage & Caching)
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  flutter_cache_manager: ^3.3.2
  
  # 媒体播放 (Media Playback - Media Kit)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.4

  # 系统工具与设备功能 (System Tools & Device Features)
  image_picker: ^1.2.1
  image_cropper: ^12.1.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  flutter_web_auth_2: ^5.0.2
  screen_brightness_platform_interface: ^2.1.0
  volume_controller: ^3.4.4
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0
  shimmer: ^3.0.0
  
  # DI (Dependency Injection)
  get_it: ^8.0.3

  # 热更新 (Hot Update)

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.15.0

flutter:
  assets:
    - assets/online_sources.json
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      linux:
        ffiPlugin: true
